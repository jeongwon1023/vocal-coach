[theme]
base = "dark"
primaryColor = "#6366f1"
backgroundColor = "#0a0a0c"
secondaryBackgroundColor = "#121216"
textColor = "#f4f4f5"
font = "sans serif"

[server]
headless = false
showEmailPrompt = false
enableCORS = true
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
