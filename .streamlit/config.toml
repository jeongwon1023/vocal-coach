[theme]
base = "light"
primaryColor = "#6366f1"
backgroundColor = "#f4f2f8"
secondaryBackgroundColor = "#faf9fd"
textColor = "#1c1528"
font = "sans serif"

[server]
headless = false
showEmailPrompt = false
enableCORS = true
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
